services:
  trenatiempo:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: trenatiempo
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../.env.local
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
